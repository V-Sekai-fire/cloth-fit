---
name: NIF

# Reproducible build of the Fine + PolyFEM Elixir NIF (cloth_fit_cli) and the
# standalone Burrito CLI binaries, on clean runners.
#
#   windows-nif : build the self-contained Windows NIF .dll (llvm-mingw) + test,
#                 publish it as an artifact.
#   linux       : build the Linux NIF and wrap a native Linux Burrito binary.
#   windows-burrito : assemble the Windows Burrito .exe on Ubuntu (Burrito hosts
#                 on Linux), injecting the Windows .dll from windows-nif.

on:
    push:
        branches: [main]
        paths: ['cloth_fit_cli/**', 'src/**', 'cmake/**', 'CMakeLists.txt', '.github/workflows/nif.yml']
    pull_request:
        paths: ['cloth_fit_cli/**', 'src/**', 'cmake/**', 'CMakeLists.txt', '.github/workflows/nif.yml']
    workflow_dispatch:

env:
    OTP_VERSION: '27'
    ELIXIR_VERSION: '1.18'
    ZIG_VERSION: '0.15.2'

jobs:
    windows-nif:
        name: Windows NIF (llvm-mingw)
        runs-on: windows-latest
        timeout-minutes: 90
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 10 }

            - name: Install llvm-mingw toolchain
              shell: bash
              run: |
                  set -euo pipefail
                  url=$(curl -fsSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest \
                      | grep -o 'https://[^"]*ucrt-x86_64\.zip' | head -1)
                  curl -fsSL -o llvm-mingw.zip "$url"
                  7z x llvm-mingw.zip -o"$HOME/llvm-mingw" -y >/dev/null
                  echo "$(dirname "$(find "$HOME/llvm-mingw" -name 'g++.exe' | head -1)")" >> "$GITHUB_PATH"

            - uses: erlef/setup-beam@v1
              with: { otp-version: '${{ env.OTP_VERSION }}', elixir-version: '${{ env.ELIXIR_VERSION }}' }

            - name: Build NIF (with USD)
              shell: bash
              working-directory: cloth_fit_cli
              env:
                  CLOTH_FIT_WITH_USD: '1'
              run: |
                  set -euo pipefail
                  mix local.hex --force && mix local.rebar --force
                  mix deps.get
                  mix cloth_fit.build_native

            - name: Smoke test NIF
              shell: bash
              working-directory: cloth_fit_cli
              run: mix run test_nifs.exs

            # Ship the whole priv/ tree: polyfem.dll + the cloth_fit_usd bridge +
            # usd_ms/tbb DLLs + the relocatable usd/ plugin registry.
            - uses: actions/upload-artifact@v4
              with:
                  name: windows-nif-priv
                  path: cloth_fit_cli/priv/
                  if-no-files-found: error

    linux:
        name: Linux NIF + Burrito binary
        runs-on: ubuntu-latest
        timeout-minutes: 90
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 10 }

            - name: Dependencies
              run: sudo apt-get update && sudo apt-get install -y build-essential cmake git python3 xz-utils 7zip

            - uses: erlef/setup-beam@v1
              with: { otp-version: '${{ env.OTP_VERSION }}', elixir-version: '${{ env.ELIXIR_VERSION }}' }

            - uses: mlugg/setup-zig@v2
              with: { version: '${{ env.ZIG_VERSION }}' }

            - name: Build NIF + Burrito binary
              working-directory: cloth_fit_cli
              run: |
                  set -euo pipefail
                  mix local.hex --force && mix local.rebar --force
                  mix deps.get
                  mix cloth_fit.build_native
                  MIX_ENV=prod mix release cloth_fit_linux

            - name: Smoke test standalone binary
              working-directory: cloth_fit_cli
              run: |
                  set -euo pipefail
                  bin=$(find burrito_out -type f | head -1)
                  echo "binary: $bin"
                  "$bin" version
                  "$bin" info-garment ../garment-data/assets/garments/Puffer_dense/garment.obj

            - uses: actions/upload-artifact@v4
              with:
                  name: cloth_fit-linux
                  path: cloth_fit_cli/burrito_out/*
                  if-no-files-found: error

    windows-burrito:
        name: Windows Burrito binary
        runs-on: ubuntu-latest
        needs: windows-nif
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 10 }

            - name: Dependencies
              run: sudo apt-get update && sudo apt-get install -y xz-utils 7zip

            - uses: erlef/setup-beam@v1
              with: { otp-version: '${{ env.OTP_VERSION }}', elixir-version: '${{ env.ELIXIR_VERSION }}' }

            - uses: mlugg/setup-zig@v2
              with: { version: '${{ env.ZIG_VERSION }}' }

            - name: Fetch Windows NIF priv/ (dll + USD bridge + runtime + plugins)
              uses: actions/download-artifact@v4
              with: { name: windows-nif-priv, path: cloth_fit_cli/priv }

            - name: Assemble Windows Burrito binary
              working-directory: cloth_fit_cli
              env:
                  CLOTH_FIT_SKIP_MAKE: '1'
              run: |
                  set -euo pipefail
                  test -f priv/polyfem.dll
                  test -f priv/libcloth_fit_usd.dll
                  test -f priv/libusd_ms.dll
                  test -d priv/usd
                  mix local.hex --force && mix local.rebar --force
                  mix deps.get
                  MIX_ENV=prod mix release cloth_fit_windows

            - uses: actions/upload-artifact@v4
              with:
                  name: cloth_fit-windows
                  path: cloth_fit_cli/burrito_out/*
                  if-no-files-found: error

    windows-burrito-test:
        name: Windows Burrito smoke test
        runs-on: windows-latest
        needs: windows-burrito
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 10 }

            - name: Fetch the Windows binary
              uses: actions/download-artifact@v4
              with: { name: cloth_fit-windows, path: dist }

            - name: Run the standalone binary
              shell: bash
              run: |
                  set -euo pipefail
                  exe=$(find dist -name '*.exe' | head -1)
                  echo "exe: $exe"
                  "$exe" version
                  "$exe" info-garment garment-data/assets/garments/Puffer_dense/garment.obj
